name: Unittest

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'milvus-proto/**'
      - 'build.rs'
      - '.github/**'
      - 'docker-compose.yml'
      
  # Triggers the workflow on push or pull request events but only for the master branch
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'milvus-proto/**'
      - 'build.rs'
      - '.github/**'
      - 'docker-compose.yml'


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ut-linux:
    name: UT on Ubuntu-${{ matrix.ubuntu }}
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ubuntu: [22.04]
    env:
      UBUNTU: ${{ matrix.ubuntu }}
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
        with:
          submodules: 'true'

      - uses: Swatinem/rust-cache@v2

      - name: Setup Milvus
        run: docker compose -f ./docker-compose.yml up -d && sleep 15s
      
      # Runs a single command using the runners shell
      - name: Run Unittest
        run: RUST_BACKTRACE=1 cargo test
      # - name: Upload coverage to Codecov
      #   if: github.repository == 'milvus-io/milvus-sdk-rust'
      #   uses: codecov/codecov-action@v1
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     file: ./coverage.project.out
      #     name: ubuntu-${{ matrix.ubuntu }}-unittests

  ut-macos:
    name: Compile on macOS 15
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'true'

      - uses: Swatinem/rust-cache@v2

      # GitHub-hosted macOS runners do not provide Docker for the Milvus integration-test stack.
      # Compile test binaries on macOS, but run Milvus-backed integration tests on Linux.
      - name: Compile Tests
        run: cargo test --no-run
